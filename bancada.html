<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Atendente - Bancada Dupla (Operação Laranja)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fbf7f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(234, 88, 12, 0.08);
            padding: 40px;
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        h1 {
            color: #ea580c;
            font-size: 26px;
            margin-bottom: 20px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #4b5563;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            background-color: #fafafa;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #ea580c;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.1);
        }

        input[type="text"].erro-campo {
            border-color: #ef4444 !important;
            background-color: #fef2f2;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2) !important;
        }

        .status-box {
            background-color: #fff7ed;
            border: 1px solid #ffedd5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 16px;
            color: #c2410c;
        }

        .status-box span {
            font-weight: bold;
            font-size: 22px;
        }

        .proximo-preview {
            background-color: #fafafa;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
            font-size: 15px;
            color: #4b5563;
            line-height: 1.6;
        }

        .proximo-preview h4 {
            color: #ea580c;
            text-transform: uppercase;
            font-size: 12px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 4px;
        }

        /* Cores solicitadas */
        .txt-presente {
            color: #16a34a !important; /* VERDE */
            font-weight: 700;
        }

        .txt-ausente {
            color: #dc2626 !important; /* VERMELHO */
            font-weight: 700;
        }

        /* BOTÃO EM COR VERDE SOLICITADO */
        .btn-call {
            width: 100%;
            background-color: #16a34a; 
            color: white;
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
        }

        .btn-call:hover {
            background-color: #15803d;
        }

        .btn-call:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        .atual-chamado {
            margin-top: 25px;
            padding: 15px;
            background-color: #fef3c7;
            border: 1px solid #fde68a;
            border-radius: 8px;
            display: none;
            text-align: left;
        }

        .atual-chamado h3 {
            color: #b45309;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 8px;
            border-bottom: 1px solid #fde68a;
            padding-bottom: 4px;
        }

        .dupla-container {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .dupla-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #fde68a;
        }

        .dupla-box h5 {
            color: #ea580c;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .dupla-box p {
            font-size: 14px;
            color: #78350f;
        }

        .dica-teclado {
            margin-top: 15px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Painel da Bancada</h1>

        <div class="form-group">
            <label for="bancadaInput">Identifique sua Bancada:</label>
            <input type="text" id="bancadaInput" placeholder="Ex: Bancada 01" autofocus required>
        </div>

        <div class="status-box">
            Motoristas aguardando: <span id="contadorFila">0</span>
        </div>

        <div class="proximo-preview">
            <h4>Próxima Chamada (Status de Presença):</h4>
            <div id="dadosProximo">Ninguém na fila</div>
        </div>

        <button id="btnChamar" class="btn-call">Chamar Próximo</button>
        <p class="dica-teclado">Pressione <strong>ENTER</strong> para Chamar a Dupla</p>

        <div id="painelAtual" class="atual-chamado">
            <h3>Última Chamada Realizada:</h3>
            <div class="dupla-container">
                <div class="dupla-box">
                    <h5>Gaiola Ímpar</h5>
                    <p><strong>Motorista:</strong> <span id="nomeAtualImpar">-</span></p>
                    <p><strong>Gaiola:</strong> <span id="gaiolaAtualImpar">-</span></p>
                </div>
                <div class="dupla-box">
                    <h5>Gaiola Par</h5>
                    <p><strong>Motorista:</strong> <span id="nomeAtualPar">-</span></p>
                    <p><strong>Gaiola:</strong> <span id="gaiolaAtualPar">-</span></p>
                </div>
            </div>
            <p style="margin-top: 10px; font-size: 13px; color: #78350f; text-align: center;">
                <strong>Horário:</strong> <span id="horaAtual">-</span>
            </p>
        </div>
    </div>

    <!-- SDK do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCndSz1N8C_i94VbQsVLu9VUIEI1du-KAo",
            authDomain: "sistema-drives.firebaseapp.com",
            databaseURL: "https://sistema-drives-default-rtdb.firebaseio.com",
            projectId: "sistema-drives",
            storageBucket: "sistema-drives.firebasestorage.app",
            messagingSenderId: "90142488187",
            appId: "1:90142488187:web:e78be9ed5943ee8e7a54de"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const contadorFila = document.getElementById('contadorFila');
        const dadosProximo = document.getElementById('dadosProximo');
        const btnChamar = document.getElementById('btnChamar');
        const bancadaInput = document.getElementById('bancadaInput');
        
        const painelAtual = document.getElementById('painelAtual');
        const nomeAtualImpar = document.getElementById('nomeAtualImpar');
        const gaiolaAtualImpar = document.getElementById('gaiolaAtualImpar');
        const nomeAtualPar = document.getElementById('nomeAtualPar');
        const gaiolaAtualPar = document.getElementById('gaiolaAtualPar');
        const horaAtual = document.getElementById('horaAtual');

        let totalGeralAguardando = 0;
        let filaCompletaLocais = [];

        // Trata qualquer variação de escrita do motorista (ex: A-1, a-1, a01, A01)
        function extrairDadosGaiola(gaiolaStr) {
            if (!gaiolaStr) return null;
            let limpo = gaiolaStr.trim().toUpperCase().replace(/\s+/g, '');
            const match = limpo.match(/^([A-Z]+)-?(\d+)$/);
            if (match) {
                const letra = match[1];
                const numero = parseInt(match[2], 10);
                const numeroPadrao = numero < 10 ? `0${numero}` : numero;
                return { 
                    letra: letra, 
                    numero: numero, 
                    gaiolaTexto: `${letra}-${numeroPadrao}` 
                };
            }
            return null;
        }

        // Calcula o número do parceiro garantindo a conversão matemática correta
        function obterParceiroGaiola(dadosGaiola) {
            if (!dadosGaiola) return null;
            const num = dadosGaiola.numero;
            let numParceiro = num % 2 !== 0 ? num + 1 : num - 1;
            const numFormatado = numParceiro < 10 ? `0${numParceiro}` : numParceiro;
            return {
                letra: dadosGaiola.letra,
                numero: numParceiro,
                gaiolaTexto: `${dadosGaiola.letra}-${numFormatado}`
            };
        }

        database.ref('fila').orderByChild('timestamp').on('value', function(snapshot) {
            let totalAguardando = 0;
            filaCompletaLocais = [];
            
            snapshot.forEach(function(childSnapshot) {
                const dados = childSnapshot.val();
                dados.id = childSnapshot.key;
                filaCompletaLocais.push(dados);
                if (dados.status === "aguardando") {
                    totalAguardando++;
                }
            });

            totalGeralAguardando = totalAguardando;
            contadorFila.innerText = totalAguardando;

            const proximoPrincipal = filaCompletaLocais.find(d => d.status === "aguardando");
            if (proximoPrincipal) {
                const infoGaiola = extrairDadosGaiola(proximoPrincipal.gaiola);
                const parceiroInfo = obterParceiroGaiola(infoGaiola);

                const parceiroFila = filaCompletaLocais.find(d => {
                    if (d.status !== "aguardando") return false;
                    const infoD = extrairDadosGaiola(d.gaiola);
                    return infoD && infoD.gaiolaTexto === parceiroInfo?.gaiolaTexto;
                });

                const principalEhImpar = infoGaiola && infoGaiola.numero % 2 !== 0;
                
                let linhaImparHTML = "";
                let linhaParHTML = "";

                if (principalEhImpar) {
                    linhaImparHTML = `<strong>Gaiola ${infoGaiola.gaiolaTexto}:</strong> <span class="txt-presente">${proximoPrincipal.nome}</span>`;
                    if (parceiroFila) {
                        linhaParHTML = `<strong>Gaiola ${parceiroInfo.gaiolaTexto}:</strong> <span class="txt-presente">${parceiroFila.nome}</span>`;
                    } else {
                        linhaParHTML = `<strong>Gaiola ${parceiroInfo ? parceiroInfo.gaiolaTexto : '-'}:</strong> <span class="txt-ausente">AGUARDANDO...</span>`;
                    }
                } else {
                    linhaParHTML = `<strong>Gaiola ${infoGaiola.gaiolaTexto}:</strong> <span class="txt-presente">${proximoPrincipal.nome}</span>`;
                    if (parceiroFila) {
                        linhaImparHTML = `<strong>Gaiola ${parceiroInfo.gaiolaTexto}:</strong> <span class="txt-presente">${parceiroFila.nome}</span>`;
                    } else {
                        linhaImparHTML = `<strong>Gaiola ${parceiroInfo ? parceiroInfo.gaiolaTexto : '-'}:</strong> <span class="txt-ausente">AGUARDANDO...</span>`;
                    }
                }

                dadosProximo.innerHTML = `${linhaImparHTML}<br>${linhaParHTML}`;
                btnChamar.disabled = false;
                btnChamar.innerText = "Chamar Dupla";
            } else {
                dadosProximo.innerHTML = "Ninguém na fila";
                btnChamar.disabled = true;
                btnChamar.innerText = "Fila Vazia";
            }
        });

        bancadaInput.addEventListener('input', function() {
            bancadaInput.classList.remove('erro-campo');
        });

        function executarChamada() {
            const bancadaDigitada = bancadaInput.value.trim();

            if (bancadaDigitada === "") {
                bancadaInput.classList.add('erro-campo');
                bancadaInput.focus();
                alert("ERRO: Por favor, identifique a sua bancada antes de realizar uma chamada!");
                return;
            }

            if (totalGeralAguardando === 0) return; 

            const agora = new Date();
            const horaFormatada = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            const principal = filaCompletaLocais.find(d => d.status === "aguardando");
            if (!principal) return;

            const infoGaiola = extrairDadosGaiola(principal.gaiola);
            const parceiroInfo = obterParceiroGaiola(infoGaiola);

            const parceiro = filaCompletaLocais.find(d => {
                if (d.status !== "aguardando") return false;
                const infoD = extrairDadosGaiola(d.gaiola);
                return infoD && infoD.gaiolaTexto === parceiroInfo?.gaiolaTexto;
            });

            // Grava o chamado do principal
            database.ref('fila/' + principal.id).update({
                status: "chamado",
                bancada: bancadaDigitada,
                horaChamado: horaFormatada,
                parceiroId: parceiro ? parceiro.id : "retardatario",
                parceiroNome: parceiro ? parceiro.nome : "AGUARDANDO...",
                parceiroGaiola: parceiroInfo ? parceiroInfo.gaiolaTexto : ""
            });

            // Se o parceiro também está presente na fila, marca-o como chamado simultaneamente
            if (parceiro) {
                database.ref('fila/' + parceiro.id).update({
                    status: "chamado",
                    bancada: bancadaDigitada,
                    horaChamado: horaFormatada,
                    parceiroId: principal.id,
                    parceiroNome: principal.nome,
                    parceiroGaiola: infoGaiola.gaiolaTexto
                });
            }

            const principalEhImpar = infoGaiola && infoGaiola.numero % 2 !== 0;
            
            if (principalEhImpar) {
                nomeAtualImpar.innerText = principal.nome;
                gaiolaAtualImpar.innerText = infoGaiola.gaiolaTexto;
                nomeAtualPar.innerText = parceiro ? parceiro.nome : "AGUARDANDO...";
                gaiolaAtualPar.innerText = parceiroInfo ? parceiroInfo.gaiolaTexto : "-";
            } else {
                nomeAtualPar.innerText = principal.nome;
                gaiolaAtualPar.innerText = infoGaiola.gaiolaTexto;
                nomeAtualImpar.innerText = parceiro ? parceiro.nome : "AGUARDANDO...";
                gaiolaAtualImpar.innerText = parceiroInfo ? parceiroInfo.gaiolaTexto : "-";
            }
            
            nomeAtualImpar.className = nomeAtualImpar.innerText === "AGUARDANDO..." ? "txt-ausente" : "txt-presente";
            nomeAtualPar.className = nomeAtualPar.innerText === "AGUARDANDO..." ? "txt-ausente" : "txt-presente";

            horaAtual.innerText = horaFormatada;
            painelAtual.style.display = "block";
        }

        btnChamar.addEventListener('click', executarChamada);

        window.addEventListener('keydown', function(evento) {
            if (evento.key === 'Enter') {
                executarChamada();
            }
        });
    </script>
</body>
</html>
